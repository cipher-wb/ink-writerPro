[pytest]
testpaths = ink-writer/scripts/data_modules/tests tests/baseline tests/audit tests/hooks tests/pacing tests/emotion tests/style_rag tests/anti_detection tests/cultural tests/memory_arch tests/semantic_recall tests/foreshadow tests/voice_fingerprint tests/plotline tests/skill_systems tests/prompts tests/parallel tests/prompt_cache tests/checker_pipeline tests/incremental_extract tests/benchmark tests/ink_init tests/harness tests/editor_wisdom tests/integration
# 注：tests/editor_wisdom 在 v13 Step 2 US-006 时发现 4 failed（mock-stale，Step 2 US-006 单例化改动后未同步），
# v14 US-002 已修（patch get_retriever 而非 Retriever）并纳入 testpaths。
pythonpath = . ink-writer/scripts ink-writer/dashboard scripts
# 说明：
# - 不在 CLI 里写相对路径，避免从不同工作目录运行时出现 coverage=0 的误报。
# - 覆盖率范围由 .coveragerc 的 [run] source 控制。
asyncio_mode = auto
markers =
    integration: end-to-end integration tests (US-018 FIX-17 P4e 等跨模块链路)
addopts = -q --cov --cov-report=term-missing --cov-fail-under=30
# 覆盖率门禁 2026-04-17 从 70 降至 30（US-004）：v5 审计 R2 指出 70% 不反映真实分布 —
# scripts/ 子集仅 13.62% 而 ink_writer/ 子集较高（综合 ~82%）。30% 作为现实基线保留
# 安全余量，避免个别文件新加代码时 CI 突然红。后续补测试（US-010）后阶梯上调 30→50→70。
