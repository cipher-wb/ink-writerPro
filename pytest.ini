[pytest]
testpaths = tests/data_modules tests/migration tests/baseline tests/audit tests/hooks tests/pacing tests/emotion tests/style_rag tests/anti_detection tests/cultural tests/memory_arch tests/semantic_recall tests/foreshadow tests/voice_fingerprint tests/plotline tests/thread_lifecycle tests/skill_systems tests/prompts tests/parallel tests/prompt_cache tests/checker_pipeline tests/incremental_extract tests/benchmark tests/ink_init tests/harness tests/editor_wisdom tests/integration tests/docs tests/infra tests/creativity tests/quality_metrics tests/reflection tests/review tests/release tests/propagation tests/progression tests/core tests/scripts tests/skills tests/prose tests/case_library tests/qdrant tests/preflight tests/maintenance tests/corpus_chunking tests/writer_self_check tests/checkers tests/rewrite_loop tests/evidence_chain tests/checkers/genre_novelty tests/checkers/golden_finger_spec tests/checkers/naming_style tests/checkers/protagonist_motive tests/checkers/golden_finger_timing tests/checkers/protagonist_agency_skeleton tests/checkers/chapter_hook_density tests/planning_review tests/market_intelligence
# 注：tests/editor_wisdom 在 v13 Step 2 US-006 时发现 4 failed（mock-stale，Step 2 US-006 单例化改动后未同步），
# v14 US-002 已修（patch get_retriever 而非 Retriever）并纳入 testpaths。
pythonpath = . ink-writer ink-writer/scripts ink-writer/dashboard scripts
# 说明：
# - 不在 CLI 里写相对路径，避免从不同工作目录运行时出现 coverage=0 的误报。
# - 覆盖率范围由 .coveragerc 的 [run] source 控制。
asyncio_mode = auto
markers =
    integration: end-to-end integration tests (US-018 FIX-17 P4e 等跨模块链路)
    windows: Windows-only tests (auto-skipped on sys.platform != "win32"，见 tests/conftest.py)
    mac: Mac/Linux (non-Windows POSIX) only tests (auto-skipped on sys.platform == "win32"，见 tests/conftest.py)
addopts = -q --cov --cov-report=term-missing --cov-fail-under=70
# 覆盖率门禁历程：
# - 2026-04-17 US-004：70 → 30（v5 审计 R2，scripts/ 子集仅 13.62%，30% 作为现实基线）
# - 2026-04-18 US-028：30 → 50（FIX-11 完成后 .coveragerc 扩展到 ink_writer/core/ + checker_pipeline；
#   实测总覆盖率 ~82%，50% 门禁留足安全余量。补入 tests/integration/test_low_coverage_modules.py
#   覆盖 encoding_validator / slim_review_bundle / step3_harness_gate 三个最低模块）。
# - 2026-04-18 US-029：50 → 70（v5 审计 R2 最终目标）。实测总覆盖率 ~82%；
#   .coveragerc omit 三个 CLI entry-point stubs（dashboard/__main__.py、scripts/__init__.py、scripts/ink.py）
#   后无业务模块 <50%，真实业务代码覆盖率全部 ≥51%。
