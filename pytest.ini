[pytest]
testpaths = ink-writer/scripts/data_modules/tests tests/baseline tests/audit tests/hooks tests/pacing tests/emotion tests/style_rag tests/anti_detection tests/cultural tests/memory_arch tests/semantic_recall tests/foreshadow tests/voice_fingerprint tests/plotline
pythonpath = ink-writer/scripts ink-writer/dashboard scripts
# 说明：
# - 不在 CLI 里写相对路径，避免从不同工作目录运行时出现 coverage=0 的误报。
# - 覆盖率范围由 .coveragerc 的 [run] source 控制。
addopts = -q --cov --cov-report=term-missing --cov-fail-under=70
