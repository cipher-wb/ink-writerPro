master_enabled: true
layers:
  layer_a_hooks: true
  layer_b_checker_router: true
  layer_c_invariants: true
  layer_d_adversarial: false
severity:
  jsonl_threshold: info
  sqlite_threshold: warn
  alert_threshold: warn
  stderr_threshold: error
