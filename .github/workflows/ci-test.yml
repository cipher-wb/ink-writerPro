name: CI Test

on:
  push:
    paths:
      - 'ink-writer/scripts/**'
      - 'ink-writer/dashboard/**'
      - 'ink-writer/agents/**'
      - 'ink-writer/skills/**'
      - 'ink_writer/**'
      - 'tests/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - 'ink-writer/scripts/requirements-dev.lock'
      - 'ink-writer/dashboard/requirements.lock'
      - '.github/workflows/ci-test.yml'
  pull_request:
    paths:
      - 'ink-writer/scripts/**'
      - 'ink-writer/dashboard/**'
      - 'ink-writer/agents/**'
      - 'ink-writer/skills/**'
      - 'ink_writer/**'
      - 'tests/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - 'ink-writer/scripts/requirements-dev.lock'
      - 'ink-writer/dashboard/requirements.lock'
      - '.github/workflows/ci-test.yml'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.14']
        exclude:
          # Windows + 3.14 alpha 目前 sentence-transformers wheel 覆盖不全；
          # Windows job 只跑 3.12 稳定版，足够覆盖 feat/windows-compat 的回归面。
          - os: windows-latest
            python-version: '3.14'
    runs-on: ${{ matrix.os }}
    env:
      # feat/windows-compat US-018：Windows CI 走 BM25 降级，避免
      # FAISS / sentence-transformers 安装超时。Mac/Linux 仍走完整 embedding。
      INK_EMBED_BACKEND: ${{ matrix.os == 'windows-latest' && 'bm25' || '' }}
      PYTHONUTF8: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked versions, 3.14)
        if: matrix.python-version == '3.14'
        run: |
          pip install -r ink-writer/scripts/requirements-dev.lock
          pip install -r ink-writer/dashboard/requirements.lock
          pip install -r requirements.txt

      - name: Install dependencies (loose versions, 3.12)
        if: matrix.python-version == '3.12'
        run: |
          pip install -r ink-writer/scripts/requirements-dev.txt
          pip install -r ink-writer/dashboard/requirements.txt
          pip install -r requirements.txt

      - name: Verify ink_writer core imports (US-003 smoke test)
        run: |
          python -c "import ink_writer.editor_wisdom, ink_writer.style_rag, ink_writer.semantic_recall, ink_writer.parallel, ink_writer.checker_pipeline; print('ink_writer core modules OK')"
          python -c "from ink_writer.editor_wisdom.retriever import Retriever; print('Retriever import-only OK')"

      - name: Verify docs-code number alignment (US-022)
        run: python scripts/verify_docs.py

      - name: Verify dashboard imports
        run: python -c "from ink_writer_dashboard_check import *" 2>/dev/null || python -c "import sys; sys.path.insert(0, 'ink-writer/dashboard'); import path_guard; import watcher; print('Dashboard imports OK')"

      - name: Run tests
        run: pytest
