name: CI Test

on:
  push:
    paths:
      - 'ink-writer/scripts/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - '.github/workflows/ci-test.yml'
  pull_request:
    paths:
      - 'ink-writer/scripts/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - '.github/workflows/ci-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (locked versions)
        run: pip install -r ink-writer/scripts/requirements.lock

      - name: Run tests
        run: pytest
