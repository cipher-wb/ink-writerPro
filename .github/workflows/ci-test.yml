name: CI Test

on:
  push:
    paths:
      - 'ink-writer/scripts/**'
      - 'ink-writer/dashboard/**'
      - 'ink-writer/agents/**'
      - 'ink-writer/skills/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - 'ink-writer/dashboard/requirements.lock'
      - '.github/workflows/ci-test.yml'
  pull_request:
    paths:
      - 'ink-writer/scripts/**'
      - 'ink-writer/dashboard/**'
      - 'ink-writer/agents/**'
      - 'ink-writer/skills/**'
      - 'pytest.ini'
      - '.coveragerc'
      - 'requirements.txt'
      - 'ink-writer/scripts/requirements.lock'
      - 'ink-writer/dashboard/requirements.lock'
      - '.github/workflows/ci-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked versions)
        run: pip install -r ink-writer/scripts/requirements.lock

      - name: Install dashboard dependencies
        run: pip install -r ink-writer/dashboard/requirements.lock

      - name: Verify dashboard imports
        run: python -c "from ink_writer_dashboard_check import *" 2>/dev/null || python -c "import sys; sys.path.insert(0, 'ink-writer/dashboard'); import path_guard; import watcher; print('Dashboard imports OK')"

      - name: Run tests
        run: pytest
