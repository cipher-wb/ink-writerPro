name: Plugin Version Check

on:
  push:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'ink-writer/.claude-plugin/plugin.json'
      - 'gemini-extension.json'
      - 'ink-writer/scripts/sync_plugin_version.py'
      - 'ink-writer/dashboard/frontend/package.json'
      - 'ink-writer/dashboard/frontend/package-lock.json'
      - 'README.md'
      - '.github/workflows/plugin-version.yml'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'ink-writer/.claude-plugin/plugin.json'
      - 'gemini-extension.json'
      - 'ink-writer/scripts/sync_plugin_version.py'
      - 'ink-writer/dashboard/frontend/package.json'
      - 'ink-writer/dashboard/frontend/package-lock.json'
      - 'README.md'
      - '.github/workflows/plugin-version.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check release metadata consistency
        run: python ink-writer/scripts/sync_plugin_version.py --check
