# 编辑星河写作智慧模块配置
enabled: true
retrieval_top_k: 15
hard_gate_threshold: 0.75
# 黄金三章阈值：US-017 后从 0.85/0.90 提升至 0.92（加入文笔维度后总体标准提高）
# US-015：拆分为硬阈值（hard，低于则阻断）+ 软阈值（soft，目标分），避免黄金三章因少量 soft 规则被反复阻断。
golden_three_threshold: 0.92  # legacy：保留向后兼容（golden_three.py 仍使用）
golden_three_hard_threshold: 0.75  # 硬阈值：低于此分才阻断 review_gate
golden_three_soft_threshold: 0.92  # 软阈值：目标分，介于 hard 和 soft 之间视为通过但记录告警
inject_into:
  context: true
  writer: true
  polish: true

# v22 US-004：主题域注册表。列出 rules.json 允许出现的 category 值，
# 供加载器校验和 writer-injection 分类别召回逻辑消费。新增 simplicity 主题域
# 承载黄金三章+战斗/高潮/爽点场景的文笔直白化硬约束（详见 data/editor-wisdom/rules.json EW-0389~EW-0402）。
categories:
  - opening
  - hook
  - golden_finger
  - character
  - pacing
  - highpoint
  - taboo
  - genre
  - ops
  - misc
  - prose_shot
  - prose_sensory
  - prose_rhythm
  - prose_density
  - simplicity

# US-017：RAG 知识库新增文笔规则来源
rule_sources:
  base:
    - "data/editor-wisdom/rules.json"
  prose_craft:
    - source: "skills/ink-write/references/writing/desire-description.md"
      categories: ["prose_sensory"]
    - source: "skills/ink-write/references/writing/combat-scenes.md"
      categories: ["prose_shot", "prose_rhythm"]
    - source: "ink-writer/references/shared/scene-craft-index.md"
      categories: ["prose_shot", "prose_density"]
    - source: "skills/ink-review/references/pacing-control.md"
      categories: ["prose_rhythm"]

# US-017：editor-wisdom-checker 评分维度（在原编辑规则评分之外，新增文笔四维）
# v22 US-004：新增 directness 维度，对应 simplicity 主题域，供 directness-checker 消费
scoring_dimensions:
  - id: shot_diversity
    label: 镜头多样性
    rule_categories: ["prose_shot"]
  - id: sensory_richness
    label: 感官丰富度
    rule_categories: ["prose_sensory"]
  - id: sentence_rhythm
    label: 句式节奏
    rule_categories: ["prose_rhythm"]
  - id: info_density_uniformity
    label: 信息密度均匀度
    rule_categories: ["prose_density"]
  - id: directness
    label: 文笔直白度
    rule_categories: ["simplicity"]

# US-017：文笔规则触发的黄金三章硬阻断类别（hard severity 自动 hard block）
# v22 US-004：simplicity 同列入硬阻断，黄金三章与战斗/高潮/爽点场景直接消费
prose_categories:
  - prose_shot
  - prose_sensory
  - prose_rhythm
  - prose_density
  - simplicity

# v22 US-004 / US-006：writer-injection 分类别召回下限默认全场景激活。
# writer_injection.py 通过 scene_mode 入参激活 directness 场景；缺失 scene_mode 时按 other 兜底。
# 激活后 simplicity 类 ≥5 条，与 directness-checker / polish-agent 保持一致。
directness_recall:
  scene_modes: ["golden_three", "combat", "climax", "high_point", "slow_build", "emotional", "other"]
  floor_categories: ["simplicity"]
  floor_per_category: 5
