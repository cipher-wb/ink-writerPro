# M3 P1 下游闭环 — 集中阈值配置（2026-04-25 起强制）
# 由 ink_writer/checker_pipeline/thresholds_loader.py 在 ink-write 启动时读一次。
# 修改后需要重启 writer 才会生效（M3 期间不做热更新）。

writer_self_check:
  # 自检 rule_compliance 通过线（每条 rule 0-1 算术平均）
  rule_compliance_threshold: 0.70

reader_pull:
  block_threshold: 60     # 真阻断线
  warn_threshold: 75      # 警告线
  bound_cases_tags:
    - reader_pull
    - hook_density
  platforms:
    fanqie:
      block_threshold: 75
      warn_threshold: 85

sensory_immersion:
  block_threshold: 65
  warn_threshold: 78

high_point:
  block_threshold: 70
  warn_threshold: 80
  platforms:
    qidian:
      block_threshold: 70
      warn_threshold: 80
    fanqie:
      block_threshold: 85
      warn_threshold: 90

conflict_skeleton:
  # 章节级 checker，score = 0.5*has_conflict + 0.3*has_three_stage + 0.2*min(count/2, 1)
  block_threshold: 0.60

protagonist_agency:
  # 章节级 checker，公式与 conflict_skeleton 同结构
  block_threshold: 0.60

rewrite_loop:
  # 最多重写轮次（每轮一个 case，按 severity 排序）
  max_rounds: 3
  # 仍失败时的兜底落盘路径（相对仓库根）
  needs_human_review_path: data/needs_human_review.jsonl

dry_run:
  # M3 上线后强制 dry-run 5 章观察期
  enabled: true
  observation_chapters: 5
  # 观察满后是否自动切真阻断
  switch_to_block_after: true

# ============================================================
# M4 P0 上游策划层 — ink-init / ink-plan Step 99 阈值（2026-04-25 起强制）
# 由 ink_writer/planning_review/{ink_init_review, ink_plan_review}.py 在 Step 99 启动时读一次。
# ============================================================

# ink-init 4 个 checker
genre_novelty:
  # LLM 题材新颖度 score = 1.0 - max(top5 相似度)
  block_threshold: 0.40
  warn_threshold: 0.55
  case_ids:
    - CASE-2026-M4-0001

golden_finger_spec:
  # LLM 4 维度（clarity / falsifiability / boundary / growth_curve）算术平均
  block_threshold: 0.65
  warn_threshold: 0.75
  case_ids:
    - CASE-2026-M4-0002

naming_style:
  # 纯规则（exact 0.0 / double_char 0.4 / single_char 0.7 / clean 1.0），多名取均值
  block_threshold: 0.70
  warn_threshold: 0.85
  case_ids:
    - CASE-2026-M4-0003

protagonist_motive:
  # LLM 3 维度（resonance / specific_goal / inner_conflict）算术平均
  block_threshold: 0.65
  warn_threshold: 0.75
  case_ids:
    - CASE-2026-M4-0004

# ink-plan 3 个 checker
golden_finger_timing:
  # 硬阻断（金手指必须在前 3 章 summary 出现）：passed → 1.0 / failed → 0.0
  block_threshold: 1.0
  warn_threshold: 1.0
  case_ids:
    - CASE-2026-M4-0005

protagonist_agency_skeleton:
  # 卷骨架级 LLM 每章 agency_score 0-1 平均
  block_threshold: 0.55
  warn_threshold: 0.70
  case_ids:
    - CASE-2026-M4-0006

chapter_hook_density:
  # density = strong_count / total_count（strong threshold = 0.5）
  block_threshold: 0.70
  warn_threshold: 0.85
  case_ids:
    - CASE-2026-M4-0007
  platforms:
    fanqie:
      block_threshold: 0.85
      warn_threshold: 0.90

# ============================================================
# prose Anti-AI Overhaul — new checkers (2026-04-27)
# ============================================================

colloquial:
  # 白话度 5 维度门禁。enabled 受 prose_overhaul_enabled（config/anti-detection.yaml）联动；
  # prose_overhaul_enabled=false 时本段 enabled 被强制 false。
  enabled: true
  block_threshold: 70
  warn_threshold: 80
  case_ids:
    - CASE-2026-0403
  platforms:
    fanqie:
      block_threshold: 80
      warn_threshold: 88
      force_aggressive: true

golden_three:
  block_threshold: 0.75
  platforms:
    qidian:
      opening_window_chars: 300
    fanqie:
      opening_window_chars: 200

emotion_curve:
  block_threshold: 65
  warn_threshold: 75
  platforms:
    fanqie:
      block_threshold: 75
      warn_threshold: 85
      require_high_frequency_fluctuation: true

# 策划期独立 dry-run 计数器（与 M3 章节级 dry_run 段独立）
planning_dry_run:
  enabled: true
  observation_runs: 5
  # 观察满后是否自动切真阻断
  switch_to_block_after: true
  # 计数器持久化路径（相对仓库根，独立于章节级 dry_run）
  counter_path: data/.planning_dry_run_counter
