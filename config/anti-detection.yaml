# Anti-Detection 句式多样性硬门禁配置
# 用于 ink-write Step 3.8，检测统计特征级 AI 味并自动修复

enabled: true

# 综合评分阈值（anti-detection-checker overall_score）
score_threshold: 70.0
golden_three_threshold: 80.0

# 最大重试次数（不含零容忍项，零容忍项直接阻断无重试）
max_retries: 1

# --- 句式多样性统计阈值 ---
# 句长变异系数下限（< 此值视为句长过于均匀）
sentence_cv_min: 0.35
# 句长均值下限（< 此值视为句子碎片化）
sentence_mean_min: 18.0
# 短句占比上限（> 此值视为短句过多）
short_sentence_ratio_max: 0.25
# 长句占比下限（< 此值视为缺乏长句纵深）
long_sentence_ratio_min: 0.15

# --- 段落结构阈值 ---
# 单句段占比下限（< 此值视为段落结构过于工整）
single_sentence_paragraph_ratio_min: 0.20
# 段落长度变异系数下限
paragraph_cv_min: 0.40

# --- 对话阈值 ---
# 对话占比下限（< 此值视为对话不足）
dialogue_ratio_min: 0.10

# --- 情感标点阈值（每千字） ---
exclamation_density_min: 1.5
ellipsis_density_min: 1.0
question_density_min: 2.0
total_emotion_punctuation_min: 5.0

# --- 因果链阈值 ---
# 因果连接词密度上限（每200字）
causal_density_max: 1.0

# --- 连接词密度阈值（每千字） ---
# 连接词总密度上限（每千字，US-014 新增）
# 2.5 为合理默认值，后续可结合标杆语料微调
conjunction_density_max: 2.5

# --- 零容忍清单 ---
# 匹配任一条目立即阻断，不触发 polish 重试
zero_tolerance:
  - id: ZT_TIME_OPENING
    description: "章节以时间标记开头（第xx日/次日/N天后等）"
    patterns:
      - "^第[一二三四五六七八九十百千万\\d]+[天日]"
      - "^[次翌]日"
      - "^[一二三四五六七八九十百千万\\d]+天[后前]"
      - "^[一二三四五六七八九十百千万\\d]+个?[月年周]后"
      - "^那天[早晚]"
      - "^[清凌]晨"
      - "^[傍黄]昏"
      - "^夜[里晚深]"
      - "^时间[来到了过了]"
      - "^[这那]一[天日年]"
  - id: ZT_MEANWHILE
    description: "使用'与此同时'全知视角转场"
    patterns:
      - "与此同时"
      - "就在此时此刻"
      - "而在此时"
      - "就在同一时间"
  - id: ZT_NOT_ONLY_BUT_ALSO
    description: "'不仅……而且/还'递进式 AI 书面语"
    patterns:
      - "不仅[^，。！？；]{0,30}，?而且"
      - "不仅[^，。！？；]{0,30}，?还"
      - "不但[^，。！？；]{0,30}，?而且"
      - "不但[^，。！？；]{0,30}，?还"
  - id: ZT_DESPITE_STILL
    description: "'尽管如此/虽然……但是'教科书转折"
    patterns:
      - "尽管如此"
      - "尽管[^，。！？；]{0,40}，?[但却]"
      - "虽然[^，。！？；]{0,40}，?但是"
      - "话虽如此"
  - id: ZT_UNDOUBTEDLY
    description: "'毫无疑问/显而易见/不言而喻'全知判断"
    patterns:
      - "毫无疑问"
      - "显而易见"
      - "不言而喻"
      - "众所周知"
      - "可想而知"
  - id: ZT_IN_SHORT
    description: "'总而言之/综上所述'论文式总结"
    patterns:
      - "总而言之"
      - "综上所述"
      - "总的来说"
      - "归根结底"
  - id: ZT_FIRST_SECOND
    description: "'首先……其次……最后'列条目式陈述"
    patterns:
      - "首先[^。！？]{0,80}，?其次"
      - "第一[^。！？]{0,60}，?第二[^。！？]{0,60}，?第三"
  - id: ZT_WORTH_MENTIONING
    description: "'值得一提的是/值得注意的是'旁白式提醒"
    patterns:
      - "值得一提的是"
      - "值得注意的是"
      - "不得不提的是"
      - "不可否认的是"

  # --- 标点 AI 指纹（US-001 prose anti-AI overhaul）---
  # 5 条标点零容忍：双破折号 / 智能引号 / 英式连字符 / 过密顿号 / 过用省略号
  # whitelist_patterns 暂留空数组，预留对话被打断 / 引用片段等豁免

  - id: ZT_EM_DASH
    description: "双破折号 —— (U+2014×2 及变体) 是最强 AI 标点指纹"
    kind: regex
    patterns:
      - "——"          # U+2014 ×2 (中文标准破折号)
      - "――"          # U+2015 ×2 (横线变体)
    whitelist_patterns: []

  - id: ZT_AI_QUOTES
    description: "智能引号 U+201C/D U+2018/9 或法式 «» 出现即阻断"
    kind: regex
    patterns:
      - "[“”‘’]"   # 中英文智能弯引号
      - "[«»]"                          # 法式引号
    whitelist_patterns: []

  - id: ZT_HYPHEN_AS_DASH
    description: "中文上下文中 ASCII '-' 当破折号使用（如 '他笑了-然后转身'）"
    kind: regex
    patterns:
      - "(?<=[一-龥])-(?=[一-龥])"
    whitelist_patterns: []

  - id: ZT_DENSE_DUNHAO
    description: "顿号密度过高（> 3/千字 视为列表化 AI 写作）"
    kind: density
    patterns:
      - "、"
    density_threshold: 3.0
    whitelist_patterns: []

  - id: ZT_ELLIPSIS_OVERUSE
    description: "省略号过用（…… 或 ... > 8/千字）"
    kind: density
    patterns:
      - "……"
      - "\\.\\.\\."   # ASCII 三点
    density_threshold: 8.0
    whitelist_patterns: []

# US-013: 硬阻断最大重写次数（默认 1）
max_hard_block_retries: 1
