scene_segmenter:
  model: claude-haiku-4-5-20251001
  min_chunk_chars: 200
  max_chunk_chars: 800
  max_retries: 3
chunk_tagger:
  model: claude-haiku-4-5-20251001
  batch_size: 5
  quality_weights:
    tension: 0.3
    originality: 0.3
    language_density: 0.2
    readability: 0.2
  max_retries: 3
chunk_indexer:
  embedding_model: Qwen/Qwen3-Embedding-8B
  embedding_base_url: https://api-inference.modelscope.cn/v1
  qdrant_collection: corpus_chunks
  upsert_batch_size: 256
  embed_batch_size: 32
