# prose-blacklist.yaml — 直白模式黑名单（US-003）+ 爆款风装逼词三域（US-002）
#
# 六大类禁用词 + 一个替换映射，供 writer-agent 直白模式、polish-agent 精简 pass、
# directness-checker 一并消费。每条都附一个 replacement 示例，用 showing
# 具体词替代 telling 抽象词——不是"改写公式"，而是提醒作者：这里必须给细节。
#
# 分类约定：
#   - abstract_adjectives  —— 抽象形容词/副词，空心化情绪或状态
#   - empty_phrases        —— 套话 / 写作综合症的万能句
#   - pretentious_metaphors—— 假比喻（本体为抽象概念，比喻成另一个抽象概念）
#   - pretentious_verbs    —— 文绉绉/镜头剧本词替"看/站/想/走"等爆款常用动词（US-002）
#   - pretentious_nouns    —— 装逼味重的抽象名词（命/天/光/愁），堆叠即 AI 味（US-002）
#   - pretentious_adverbs  —— 文言味重的状语（缓缓/徐徐/悄然），段首高发（US-002）
#
# 数量下限：
#   - PRD US-003：abstract_adjectives ≥ 50 / empty_phrases ≥ 30 / pretentious_metaphors ≥ 20
#   - PRD US-002：pretentious_verbs ≥ 30 / pretentious_nouns ≥ 30 / pretentious_adverbs ≥ 30
#   当前：53 / 32 / 22 / 32 / 36 / 32 = 合计 207 条。
#
# 词表来源（US-002 三域）：
#   benchmark/reference_corpus/per_book_stats 中"AI 比"偏高的高频词；
#   取 5 本爆款（猪三样、辰东式）出场频次极低、5 本严肃文学频次显著高的 ~30 词/类。
#   每条 replacement 给出"作者偷懒提示 + 1-3 个具体爆款替换"；机械替换走 replacement_map。
#
# 格式：每条 `{word, replacement}`，加载器 `ink_writer/prose/blacklist_loader.py`
# 统一消费，US-001 analyze_prose_directness 也可用 --blacklist 读取同文件。
# replacement_map 段：{装逼词: [爆款替换 1, 替换 2, ...]}，多候选时 polish-agent
# US-003 simplification_pass 取首项做正则替换（保留候选 2/3 给 LLM rewrite mode 兜底）。

version: 2

abstract_adjectives:
  - word: 莫名
    replacement: '具体情绪名词（如"一阵心慌"/"后颈发凉"），不要让读者自己猜'
  - word: 无尽
    replacement: '量化时长（如"一连三日"/"过了半个时辰"）'
  - word: 难以言喻
    replacement: '拆成味觉/嗅觉/触觉具体描写（如"甜得发齁"）'
  - word: 仿佛
    replacement: 多半可直接删除；保留也要接具体动作而非概念
  - word: 似乎
    replacement: '删除——让角色断言；真要表不确定就写"怀疑"'
  - word: 似有若无
    replacement: '量化（"三分的冷"）或删除'
  - word: 若有若无
    replacement: 同上；纯属凑字数
  - word: 恍惚
    replacement: '具体动作（"眼神飘开半秒"/"手指一松"）'
  - word: 恍若
    replacement: 换具体实物类比，禁 abstract→abstract
  - word: 宛如
    replacement: 用具体比喻；若本体已抽象，直接删掉这半句
  - word: 犹如
    replacement: '同"宛如"——网文里 9 成都是凑字'
  - word: 隐隐
    replacement: '量化（"约两分疼"/"每三息一阵"）'
  - word: 淡淡
    replacement: '换具体修饰（"一丝茶香"/"薄薄一层"）'
  - word: 微微
    replacement: '量化（"眉峰挑了半分"）——"微微"是形容词偷懒'
  - word: 仿若
    replacement: '同"仿佛"；直白场景一律删'
  - word: 隐约
    replacement: '换量化距离或可见度（"十步外还看得见"）'
  - word: 朦胧
    replacement: '给具体遮挡（"雾遮到腰"/"泪水糊了镜"）'
  - word: 迷离
    replacement: '具体表情（"眼皮半阖"/"焦点在三尺外"）'
  - word: 空灵
    replacement: '具体感受（"风穿过袖口，没挂到皮肤"）'
  - word: 虚无
    replacement: '网文毒瘤词；换"空荡"+具体画面（"桌上只剩半杯冷茶"）'
  - word: 缥缈
    replacement: '换具体距离感（"三里外的山影"）'
  - word: 飘渺
    replacement: '同"缥缈"；此字常被误写成"飘渺"，双错'
  - word: 浩渺
    replacement: '换具体尺度（"一眼望不到对岸"）'
  - word: 深邃
    replacement: '换具体反应（"瞳孔缩成一线"）'
  - word: 莫测
    replacement: '让角色说出顾虑；"高深莫测"= 作者偷懒'
  - word: 不可名状
    replacement: 直接命名——硬写不出就改剧情
  - word: 难以名状
    replacement: 同上；禁区词
  - word: 不可思议
    replacement: '具体反应（"他愣在原地"/"倒退半步"）'
  - word: 难以形容
    replacement: 写不出具体感受就不要写这一句
  - word: 某种
    replacement: '直接指代——"一种"/"某种"= 逃避描写'
  - word: 不知为何
    replacement: 作者知道就直说；不知道就换视角
  - word: 不知不觉
    replacement: '给时间坐标（"等回神时天已黑"）'
  - word: 鬼使神差
    replacement: '给具体动因（"他看见门缝里一线光，伸手推了过去"）'
  - word: 无可奈何
    replacement: '具体动作（"摆了摆手"/"把刀放回鞘里"）'
  - word: 情不自禁
    replacement: '删除——让动作自己说明"情不自禁"'
  - word: 不由自主
    replacement: 同上；动作足够具体就不需要标签
  - word: 突如其来
    replacement: '给触发点（"门外一声巨响"）'
  - word: 蓦然
    replacement: '换具体触发（"转头那一瞬"）'
  - word: 骤然
    replacement: '同"蓦然"；触发点要可见'
  - word: 倏然
    replacement: 同上；避免连用
  - word: 陡然
    replacement: '同上；"陡然一惊"换成具体反应'
  - word: 猝然
    replacement: '同"蓦然"；文言味重，直白场景慎用'
  - word: 顿时
    replacement: '具体反应代替副词（"脸一下涨红"）'
  - word: 霎时
    replacement: '同"顿时"；是副词偷懒'
  - word: 愕然
    replacement: '具体反应（"张开嘴又合上"）'
  - word: 黯然
    replacement: '具体表情（"眼角低了两分"）'
  - word: 茫然
    replacement: '具体动作（"盯着空碗"/"问题听了两遍才反应"）'
  - word: 惘然
    replacement: '同"茫然"；更抽象，更该换'
  - word: 森然
    replacement: '换具体感受（"颈后寒毛竖起"）'
  - word: 悚然
    replacement: '同"森然"；身体反应替代情绪形容'
  - word: 泰然
    replacement: '让角色做平常动作（"继续喝茶"）'
  - word: 豁然
    replacement: '换具体表情（"眉头松开"/"笑出半声"）'
  - word: 漠然
    replacement: '具体动作（"看了一眼，转身关门"）'

empty_phrases:
  - word: 此情此景
    replacement: '直接描写画面——"她站在门外，雨顺屋檐砸进她袖口"'
  - word: 仿佛回到了
    replacement: 进入实际回忆场景，不要用这根拐杖
  - word: 时间仿佛静止
    replacement: '具体动作冻结（"他举着的茶杯没落下"）'
  - word: 仿佛过了一个世纪
    replacement: '量化（"三息后"/"两句话的工夫"）'
  - word: 说不出的感觉
    replacement: '具体感受（"胃里翻上一股酸"）'
  - word: 一时间
    replacement: 删除；直接写后续动作
  - word: 不知过了多久
    replacement: '给具体时间坐标（"等他回神，香已烧完半炷"）'
  - word: 眼神变得复杂
    replacement: '具体表情（"眉头皱起又松开，嘴角扯了一下"）'
  - word: 心里五味杂陈
    replacement: '列出具体情绪（"又气又怕，怕过又有点得意"）'
  - word: 心中百感交集
    replacement: '同上；"百感交集"= 一个也写不出'
  - word: 脸色变得难看
    replacement: '具体反应（"脸色发青"/"咬紧牙根"）'
  - word: 仿佛被什么击中
    replacement: '具体身体反应（"他后退半步，背靠在门框上"）'
  - word: 心头一震
    replacement: '具体反应（"手里的笔顿住"）'
  - word: 内心翻江倒海
    replacement: 删除——让具体动作替代
  - word: 心情复杂
    replacement: '同"心中百感交集"；写不出就先减一个形容'
  - word: 说不清道不明
    replacement: '剧情需要不清楚时，换成"他自己也没理清"+ 一句具体'
  - word: 像是想起了什么
    replacement: '说出想起的内容，或写动作（"他伸手摸向胸前布包"）'
  - word: 似乎意识到了什么
    replacement: 同上；别让读者猜
  - word: 仿佛明白了什么
    replacement: 同上；真明白就写出内容
  - word: 眼里闪过一丝
    replacement: '具体眼神（"眼角先动"/"瞳孔缩小"）'
  - word: 脸上掠过一丝
    replacement: '具体表情（"嘴角先扯动"）'
  - word: 嘴角扯出一丝
    replacement: '写笑法（"冷笑半声"/"抿了抿"）'
  - word: 气氛变得凝重
    replacement: '具体（"屋里没人说话，只听见窗外风撞瓦"）'
  - word: 空气仿佛凝固
    replacement: '具体（"一时连呼吸声都听得见"）'
  - word: 场面一度陷入沉默
    replacement: 同上；描写一个具体停滞动作
  - word: 周围安静得可怕
    replacement: '具体可听见的细节（"檐下滴水声变清"）'
  - word: 心头涌起一种
    replacement: 直接命名情绪+身体反应
  - word: 一种难以言喻的
    replacement: 能写就写，写不出就删这句
  - word: 一股莫名的
    replacement: 同上；禁区
  - word: 不由得心头一紧
    replacement: '具体动作（"右手攥紧袖口"）'
  - word: 不禁皱起眉头
    replacement: '直接"他皱眉"——去掉"不禁"'
  - word: 忍不住笑了
    replacement: '直接"他笑出声"——去"忍不住"'

pretentious_metaphors:
  - word: 宛如…一般
    replacement: 换具体实物比喻，或直接删——本体抽象时一律删
  - word: 犹如…似的
    replacement: '同"宛如…一般"；两层标记叠加是自我怀疑'
  - word: 恍若…之态
    replacement: 文言味最重的一型；直白场景禁用
  - word: 如…一般
    replacement: '留"如"删"一般"；或者换强动词替比喻'
  - word: 像…似的
    replacement: '"像"后必须接具体实物+动作（"像被抽筋一样瘫下"）'
  - word: 仿佛…一般
    replacement: '"仿佛"和"一般"留一个就够；最好都删'
  - word: 好似…般
    replacement: 同上；套话感浓
  - word: 恍如…般
    replacement: 文言；直白场景一律换
  - word: 如同…一般
    replacement: '双重标记；留"如同"足矣'
  - word: 犹若…一般
    replacement: 文言；换现代具体比喻
  - word: 若…之状
    replacement: '直接写角色"看起来像 X"，不要"之状"'
  - word: 宛若…之貌
    replacement: '同上；"之貌"/"之态"是网文古风的拐杖'
  - word: 比…还要
    replacement: '给量化（"比平时快一倍"），不要比抽象'
  - word: 如…那般
    replacement: '"那般"可省；换具体'
  - word: 像…那样
    replacement: '"那样"后必须接可见动作，不要接形容词'
  - word: 如同…那样
    replacement: '同"像…那样"；双重指示省一个'
  - word: 类似…一样
    replacement: 双重语意；留一个
  - word: 状若…一般
    replacement: 文言+双标记；禁区
  - word: 恍然…之间
    replacement: '给具体时间点（"转身那一刻"）'
  - word: 仿若…一般
    replacement: '同"仿佛…一般"；双标记省一'
  - word: 有如…之意
    replacement: '"之意"是总结抽象的尾巴——删'
  - word: 如梦如幻
    replacement: '成语，几乎总是空的；换具体感官（"风一过，人就散了"）'

# ---------------------------------------------------------------------------
# 以下为 PRD US-002 新增三域 + replacement_map（爆款风装逼词机械替换）。
# 每条 replacement 字段是给作者的"教学性提示"；机械替换走 replacement_map。
# ---------------------------------------------------------------------------

pretentious_verbs:
  - word: 凝视
    replacement: '换具体看法（"盯着"/"看着"/"死盯"）；"凝视"是镜头剧本词，爆款不用'
  - word: 伫立
    replacement: '换"站着"/"戳那儿不动"——"伫立"几乎从不出现在猪三样'
  - word: 驻足
    replacement: '换"停下"/"站住"——"驻足"是新闻稿味'
  - word: 凝望
    replacement: '换"望着"/"盯着"——双"凝"叠加更装'
  - word: 审视
    replacement: '换"打量"/"上下扫了一眼"——"审视"是法庭词'
  - word: 睥睨
    replacement: '换"斜眼瞧"/"瞟一眼"——"睥睨"= 文言味暴击'
  - word: 睨视
    replacement: '同"睥睨"；现代场景一律换'
  - word: 俯瞰
    replacement: '换"往下看"/"朝下扫一眼"——除非真的写空中视角'
  - word: 仰望
    replacement: '换"抬头看"/"仰头"——"仰望"诗化味重'
  - word: 瞥见
    replacement: '换"瞥到"/"余光扫到"——"瞥见"也行，但堆叠时换掉'
  - word: 扫视
    replacement: '换"扫一眼"/"看一圈"——"扫视"军事剧本词'
  - word: 颔首
    replacement: '换"点头"/"点了下头"——"颔首"古风过头'
  - word: 摇首
    replacement: '换"摇头"——"摇首"几乎只见于古风注水文'
  - word: 垂眸
    replacement: '换"低头"/"垂眼"——"垂眸"是言情套话'
  - word: 凝思
    replacement: '换"琢磨"/"想"——"凝思"是哲学词'
  - word: 沉吟
    replacement: '换"想了想"/"顿了一下"——"沉吟"古风词'
  - word: 屏息
    replacement: '换"屏住气"/"不敢喘"——"屏息"叙述味重'
  - word: 凝神
    replacement: '换"凑近一些"/"集中看"——"凝神"是练功术语'
  - word: 踱步
    replacement: '换"来回走"/"转悠"——"踱步"古风'
  - word: 徘徊
    replacement: '换"转来转去"/"来回走"——"徘徊"诗化味'
  - word: 端详
    replacement: '换"仔细看"/"上下打量"——"端详"老干部腔'
  - word: 打量
    replacement: '可保留，但不要每段都用；偶尔换"瞅"/"看"'
  - word: 凝眸
    replacement: '换"盯着看"/"死死盯着"——"凝眸"言情词'
  - word: 眯眸
    replacement: '换"眯眼"/"眼一眯"——"眯眸"古风'
  - word: 回眸
    replacement: '换"回头"/"回头瞧"——"回眸"是 MV 词'
  - word: 回首
    replacement: '换"回头"——"回首"诗词味'
  - word: 顾盼
    replacement: '换"东张西望"/"四处看"——"顾盼"古风装'
  - word: 昂首
    replacement: '换"仰头"/"抬高头"——"昂首"军政词'
  - word: 怔愣
    replacement: '换"愣了一下"/"一时反应不过来"——"怔愣"古风'
  - word: 静伫
    replacement: '换"站着不动"/"站住"——"静伫"古风暴击'
  - word: 静立
    replacement: '换"站住"/"站定"——"静立"古风'
  - word: 默立
    replacement: '换"一声不吭地站着"/"杵着"——"默立"古风'

pretentious_nouns:
  - word: 宿命
    replacement: '换"命"/"注定"——"宿命"是港片字幕词'
  - word: 苍茫
    replacement: '换"一片广"/"看不到头"——"苍茫"诗词味，堆叠就 AI'
  - word: 沧桑
    replacement: '换"老相"/"风霜"/"老脸"——"沧桑"是简历套话'
  - word: 孤寂
    replacement: '换"孤独"/"一个人"/"冷清"——"孤寂"诗化'
  - word: 静谧
    replacement: '换"安静"/"没声音"——"静谧"散文味'
  - word: 缱绻
    replacement: '换"缠绵"/"黏在一起"——"缱绻"言情套话'
  - word: 旖旎
    replacement: '换"漂亮"/"好看"——"旖旎"= 词没用对地方'
  - word: 暮色
    replacement: '换"天黑"/"傍晚"——"暮色"诗化'
  - word: 余晖
    replacement: '换"夕阳"/"落日"——"余晖"已成 AI 标志'
  - word: 残阳
    replacement: '换"夕阳"/"落日"——"残阳"古诗词味'
  - word: 朔风
    replacement: '换"北风"/"寒风"——"朔风"古风暴击'
  - word: 寒霜
    replacement: '换"霜"/"冷气"——"寒霜"凑字'
  - word: 流光
    replacement: '换"时光"/"时间"——"流光"诗词味'
  - word: 流年
    replacement: '换"岁月"/"光阴"——"流年"流行歌词'
  - word: 韶华
    replacement: '换"青春"/"好时候"——"韶华"古风装'
  - word: 浮生
    replacement: '换"一辈子"/"这一生"——"浮生"古风装'
  - word: 红尘
    replacement: '换"人世"/"凡间"——"红尘"古风修仙词，慎用'
  - word: 桎梏
