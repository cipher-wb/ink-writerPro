# ---------------------------------------------------------------------------
# replacement_map（PRD US-002）：装逼词 → 1-3 个爆款替换。
# polish-agent simplification_pass（US-003）取首项做正则替换；
# Hard Block Rewrite Mode（US-013）保留候选 2/3 给 LLM rewrite 兜底用。
# 双向查询：blacklist_loader.ReplacementMap.lookup(凝视) -> (盯着, 看着, 死盯)
#                                     .origins(盯着) -> (凝视, 凝望, 凝眸, ...)
# ---------------------------------------------------------------------------

